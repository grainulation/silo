name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify zero dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            if (pkg.dependencies && Object.keys(pkg.dependencies).length > 0) {
              console.error('silo: found runtime dependencies:', pkg.dependencies);
              process.exit(1);
            }
            console.log('Zero dependencies verified');
          "
      - name: Run tests
        run: npm test
      - name: CLI help check
        run: node bin/silo.js --help

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm pack --dry-run
